<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Celestia — Daily Horoscope</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #05060f; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.1);
  --gold: #c9a96e; --gold-light: #f0d090; --violet: #8b5cf6; --blue: #3b82f6;
  --text: white; --muted: rgba(232,224,213,0.45);
}
html,body { height:100%; overflow:hidden; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; }
#cosmos { position:fixed; inset:0; pointer-events:none; z-index:0; }
.shell { position:relative; z-index:1; width:100%; max-width:460px; padding:16px 16px 24px; height:100vh; overflow-y:auto; scrollbar-width:none; }
.shell::-webkit-scrollbar { display:none; }
.header { text-align:center; margin-bottom:18px; padding-top:8px; }
.header .eyebrow { font-size:10px; font-weight:300; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
.header h1 { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:300; letter-spacing:2px; line-height:1; background:linear-gradient(135deg,var(--gold-light),var(--gold),#a07040); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .tagline { font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
.tabs { display:flex; gap:6px; margin-bottom:14px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; padding:5px; }
.tab { flex:1; padding:9px 4px; background:none; border:none; border-radius:10px; color:var(--muted); font-family:'Outfit',sans-serif; font-size:11px; font-weight:400; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.25s ease; }
.tab.active { background:rgba(201,169,110,0.15); color:var(--gold-light); box-shadow:0 0 12px rgba(201,169,110,0.1); }
.card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:22px 20px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); position:relative; overflow:hidden; margin-bottom:12px; }
.card::before { content:''; position:absolute; top:-1px; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.panel { display:none; }
.panel.active { display:block; }

/* birth */
.birth-section { margin-bottom:18px; }
.birth-section label { display:block; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.birth-row { display:flex; gap:8px; align-items:center; }
.birth-input { flex:1; padding:10px 13px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Outfit',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
.birth-input:focus { border-color:var(--gold); }
.birth-input::-webkit-calendar-picker-indicator { filter:invert(0.6) sepia(1) hue-rotate(10deg); }
.detect-btn { padding:10px 15px; background:rgba(201,169,110,0.1); border:1px solid rgba(201,169,110,0.3); border-radius:12px; color:var(--gold); font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.detect-btn:hover { background:rgba(201,169,110,0.2); }
.detected-sign { display:none; margin-top:9px; padding:9px 13px; border-radius:12px; background:rgba(201,169,110,0.08); border:1px solid rgba(201,169,110,0.2); font-size:12px; color:var(--gold-light); text-align:center; }
.detected-sign.show { display:block; }

/* constellation */
.constellation-wrap { margin-bottom:16px; border-radius:16px; overflow:hidden; border:1px solid var(--border); background:rgba(0,0,0,0.3); position:relative; }
.constellation-wrap canvas { display:block; width:100%; height:120px; }
.constellation-name { position:absolute; bottom:7px; right:11px; font-family:'Cormorant Garamond',serif; font-size:12px; font-style:italic; color:rgba(201,169,110,0.55); letter-spacing:1px; }

/* sign grid */
.sign-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:7px; margin-bottom:18px; }
.sign-btn { aspect-ratio:1; background:none; border:1px solid var(--border); border-radius:11px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; transition:all 0.2s ease; padding:3px; }
.sign-btn .emoji { font-size:15px; line-height:1; }
.sign-btn .label { font-size:6.5px; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; font-family:'Outfit',sans-serif; font-weight:300; }
.sign-btn:hover { border-color:var(--gold); background:rgba(201,169,110,0.08); transform:translateY(-2px); }
.sign-btn.active { border-color:var(--gold); background:rgba(201,169,110,0.15); box-shadow:0 0 14px rgba(201,169,110,0.2); }
.sign-btn.active .label { color:var(--gold); }
.sign-btn.active-b { border-color:var(--violet); background:rgba(139,92,246,0.15); box-shadow:0 0 14px rgba(139,92,246,0.2); }
.sign-btn.active-b .label { color:#c4b5fd; }

/* buttons */
.reveal-btn { width:100%; padding:13px; border:1px solid rgba(201,169,110,0.4); border-radius:14px; background:linear-gradient(135deg,rgba(201,169,110,0.15),rgba(139,92,246,0.1)); color:var(--gold-light); font-family:'Outfit',sans-serif; font-size:12px; font-weight:400; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.3s ease; position:relative; overflow:hidden; }
.reveal-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,169,110,0.2),transparent); opacity:0; transition:opacity 0.3s; }
.reveal-btn:hover::after { opacity:1; }
.reveal-btn:hover { border-color:var(--gold); box-shadow:0 0 28px rgba(201,169,110,0.25); transform:translateY(-1px); }
.reveal-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* compat labels */
.compat-labels { display:flex; justify-content:space-between; margin-bottom:7px; }
.compat-labels span { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.compat-labels span:last-child { color:#c4b5fd; }

/* loading */
.loading { text-align:center; padding:22px 0 8px; display:none; }
.loading.show { display:block; }
.orbit { width:36px; height:36px; margin:0 auto 9px; position:relative; }
.orbit::before,.orbit::after { content:''; position:absolute; border-radius:50%; border:1px solid transparent; }
.orbit::before { inset:0; border-top-color:var(--gold); animation:spin 1.2s linear infinite; }
.orbit::after { inset:5px; border-top-color:var(--violet); animation:spin 0.8s linear infinite reverse; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading p { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; animation:pulse 1.5s ease-in-out infinite; }
.loading-phase { font-size:9px; color:rgba(201,169,110,0.5); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; min-height:14px; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* result */
.result { margin-top:18px; opacity:0; transform:translateY(12px); transition:all 0.5s cubic-bezier(0.16,1,0.3,1); display:none; }
.result.show { opacity:1; transform:translateY(0); display:block; }
.result-header { display:flex; align-items:center; gap:12px; margin-bottom:13px; padding-bottom:13px; border-bottom:1px solid var(--border); }
.result-emoji { font-size:28px; filter:drop-shadow(0 0 8px rgba(201,169,110,0.4)); }
.result-meta h3 { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:var(--gold-light); letter-spacing:1px; }
.result-meta .date { font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; }
.result-text { font-size:16px; font-weight:300; line-height:1.75; color:var(--text); margin-bottom:16px; }
.lang-toggle { display:flex; gap:6px; margin-bottom:12px; }
.lang-btn { flex:1; padding:6px; background:none; border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'Outfit',sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.lang-btn.active { background:rgba(201,169,110,0.12); border-color:rgba(201,169,110,0.4); color:var(--gold-light); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:9px 11px; text-align:center; }
.stat .stat-label { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.stat .stat-value { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:600; color:var(--gold-light); }
.stat.full { grid-column:1/-1; }

/* compat result */
.compat-result { margin-top:18px; opacity:0; transform:translateY(12px); transition:all 0.5s cubic-bezier(0.16,1,0.3,1); display:none; }
.compat-result.show { opacity:1; transform:translateY(0); display:block; }
.compat-pair { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:14px; }
.sign-pill { padding:7px 14px; border-radius:24px; font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:400; letter-spacing:1px; }
.sign-pill.a { background:rgba(201,169,110,0.15); border:1px solid rgba(201,169,110,0.35); color:var(--gold-light); }
.sign-pill.b { background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.35); color:#c4b5fd; }
.heart { font-size:18px; animation:heartbeat 1.4s ease-in-out infinite; }
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
.score-ring-wrap { text-align:center; margin-bottom:14px; }
.compat-cats { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:13px; }
.compat-cat { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:9px 10px; text-align:center; }
.cat-name { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.cat-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.06); overflow:hidden; margin-bottom:4px; }
.cat-fill { height:100%; border-radius:2px; transition:width 1.2s ease; }
.cat-val { font-size:11px; color:var(--gold-light); font-family:'Cormorant Garamond',serif; font-weight:600; }
.compat-desc { font-family:'Cormorant Garamond',serif; font-size:15px; font-style:italic; line-height:1.7; color:var(--text); padding:11px 13px; background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:12px; }

/* translation badge */
.translated-badge { display:inline-flex; align-items:center; gap:5px; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(201,169,110,0.6); margin-bottom:10px; }
.translated-badge::before { content:'✦'; font-size:8px; }

/* error */
.error { margin-top:13px; padding:11px; border-radius:12px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); font-size:12px; color:#fca5a5; text-align:center; display:none; }
.error.show { display:block; }
.footer { text-align:center; margin-top:10px; margin-bottom:6px; font-size:10px; color:rgba(232,224,213,0.18); letter-spacing:1px; }
.orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
.orb-1 { width:300px; height:300px; background:radial-gradient(circle,rgba(139,92,246,0.12),transparent 70%); top:-100px; right:-80px; }
.orb-2 { width:250px; height:250px; background:radial-gradient(circle,rgba(59,130,246,0.08),transparent 70%); bottom:-80px; left:-60px; }
</style>
</head>

  "Air-Earth":   "Մեկը պլանավորում է, մյուսը երազում։ Միասին ծածկում եք բոլոր անկյունները — եթե սովորում եք կեսճանապարհին հանդիպել։",
  "Earth-Water": "Երկիրն Ջուրն ատկ պահում է։ Ամենասնուցող զույգերից մեկը — հուզական խորությունը հանդիպում է գործնական խնամքի հետ։",
  "Air-Air":     "Անջատ խոսակցություն, ընդհանուր հետաքրքրություն, մտավոր 花火 (hanabi)։ Պարտավորությունը կարող է ավելի կանխամտածված խնամք պահանջել։",
  "Air-Water":   "Բանաստեղծական զույգ, լի զգացմունքով ու մտքով։ Թյուրիմացություններ հնարավոր են, բայց կարեկցանքը խոր է։",
  "Water-Water": "Ոսկե խորություններ։ Խորապես ինտուիտիվ և հուզականորեն կապված — պարզապես մի անգամ էլ շնչեք թարմ օդ։"
};

const MOODS_HY  = ["✨ Ոգեշնչված","💫 Խաղաղ","🔥 Եռանդուն","🌙 Մտածկոտ","⚡ Համարձակ","🌊 Հոսուն","🌸 Մեղմ","🌟 Փայլուն"];
const COLORS_HY = ["Կեսգիշերային Կապույտ","Մուգ Բոսոր","Անտառ Կանաչ","Վարդագույն Ոսկի","Սաթ","Մանուշակ","Փղոսկր","Կապաճ"];

let selectedSign = SIGNS[0];
let compatSignA  = SIGNS[0];
let compatSignB  = SIGNS[1];
let compatPickB  = false;
let currentLang  = 'hy'; // 'hy' or 'en'
let currentData  = null;

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function detectSign() {
  const val = document.getElementById('birthDate').value;
  if (!val) return;
  const d = new Date(val+'T12:00:00');
  const m = d.getMonth()+1, day = d.getDate();
  const sign = getSignFromDate(m, day);
  const idx  = SIGNS.findIndex(s=>s.name===sign.name);
  const box  = document.getElementById('detectedSign');
  box.textContent = `${sign.emoji} Ձեր նշանն է ${sign.nameHY} — ${sign.element} · Կառավարիչ ${sign.ruling}`;
  box.classList.add('show');
  selectSign(idx);
}

function getSignFromDate(m, d) {
  for (const s of SIGNS) {
    const [sm,sd]=s.start, [em,ed]=s.end;
    if (sm<=em) { if((m===sm&&d>=sd)||(m===em&&d<=ed)||(m>sm&&m<em)) return s; }
    else { if((m===sm&&d>=sd)||(m===em&&d<=ed)||m>sm||m<em) return s; }
  }
  return SIGNS[0];
}

const constCanvas = document.getElementById('constCanvas');
const constCtx    = constCanvas.getContext('2d');

function drawConstellation(signName) {
  const pts = CONSTELLATIONS[signName]||CONSTELLATIONS.Aries;
  const W   = constCanvas.offsetWidth||400, H=120, dpr=devicePixelRatio||1;
  constCanvas.width=W*dpr; constCanvas.height=H*dpr;
  constCtx.scale(dpr,dpr);
  constCtx.clearRect(0,0,W,H);
  const px = pts.map(p=>[p[0]*W, p[1]*H]);
  constCtx.strokeStyle='rgba(201,169,110,0.22)';
  constCtx.lineWidth=1;
  constCtx.beginPath();
  px.forEach(([x,y],i)=>i===0?constCtx.moveTo(x,y):constCtx.lineTo(x,y));
  constCtx.stroke();
  px.forEach(([x,y],i)=>{
    const r=i===0?3.5:2.5;
    const g=constCtx.createRadialGradient(x,y,0,x,y,r*4);
    g.addColorStop(0,'rgba(240,208,144,0.85)');
    g.addColorStop(1,'rgba(240,208,144,0)');
    constCtx.beginPath(); constCtx.arc(x,y,r*3.5,0,Math.PI*2);
    constCtx.fillStyle=g; constCtx.fill();
    constCtx.beginPath(); constCtx.arc(x,y,r,0,Math.PI*2);
    constCtx.fillStyle='rgba(255,248,225,0.95)'; constCtx.fill();
  });
  document.getElementById('constName').textContent=signName;
}

function buildGrid(id, clickFn) {
  const grid=document.getElementById(id);
  SIGNS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='sign-btn'; btn.dataset.index=i;
    btn.innerHTML=`<span class="emoji">${s.emoji}</span><span class="label">${s.nameHY.slice(0,4)}</span>`;
    btn.onclick=()=>clickFn(i);
    grid.appendChild(btn);
  });
}
buildGrid('signGrid', selectSign);
buildGrid('compatGrid', selectCompatSign);

function selectSign(i) {
  document.querySelectorAll('#signGrid .sign-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#signGrid .sign-btn')[i].classList.add('active');
  selectedSign=SIGNS[i];
  document.getElementById('result').classList.remove('show');
  document.getElementById('error').classList.remove('show');
  drawConstellation(selectedSign.name);
}

function selectCompatSign(i) {
  const btns=document.querySelectorAll('#compatGrid .sign-btn');
  if (!compatPickB) {
    btns.forEach(b=>b.classList.remove('active','active-b'));
    btns[i].classList.add('active');
    compatSignA=SIGNS[i]; compatPickB=true;
    document.getElementById('compatResult').classList.remove('show');
  } else {
    if (SIGNS[i]===compatSignA) return;
    btns.forEach(b=>b.classList.remove('active-b'));
    btns[i].classList.add('active-b');
    compatSignB=SIGNS[i]; compatPickB=false;
    document.getElementById('compatResult').classList.remove('show');
  }
}

selectSign(0);
document.querySelectorAll('#compatGrid .sign-btn')[0].classList.add('active');
document.querySelectorAll('#compatGrid .sign-btn')[1].classList.add('active-b');

const bgCanvas=document.getElementById('cosmos'), bgCtx=bgCanvas.getContext('2d');
let bgStars=[];
function resizeBg() {
  bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight;
  bgStars=Array.from({length:200},()=>({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,r:Math.random()*1.2+0.2,speed:Math.random()*0.008+0.002,phase:Math.random()*Math.PI*2}));
}
function drawBg(t) {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgStars.forEach(s=>{const a=0.3+0.7*(0.5+0.5*Math.sin(t*s.speed+s.phase));bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);bgCtx.fillStyle=`rgba(255,245,220,${a})`;bgCtx.fill();});
  requestAnimationFrame(drawBg);
}
window.addEventListener('resize',resizeBg); resizeBg(); requestAnimationFrame(drawBg);

/* TRANSLATION via MyMemory free API (no key needed) */
async function translateToArmenian(text) {
  // Split into sentences to stay under MyMemory's 500-char limit per request
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  const chunks = [];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > 480) {
      if (current) chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());

  const translated = [];
  for (const chunk of chunks) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=en|hy`;
    const res = await fetch(url);
    const data = await res.json();
    const t = data?.responseData?.translatedText;
    translated.push(t && t !== chunk ? t : chunk);
    await delay(200); // be polite to the free API
  }
  return translated.join(' ');
}

function cacheKey(sign) { return `celestia_v3_${sign}_${new Date().toDateString()}`; }

(function clearOldCache() {
  const toDelete = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("celestia_") && !k.startsWith("celestia_v3_")) toDelete.push(k);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
})();

function setPhase(msg) {
  const el = document.getElementById('loadingPhase');
  if (el) el.textContent = msg;
}

async function loadHoroscope() {
  const btn=document.getElementById('revealBtn'), loading=document.getElementById('loading');
  const resultEl=document.getElementById('result'), errorEl=document.getElementById('error');
  resultEl.classList.remove('show'); errorEl.classList.remove('show');
  loading.classList.add('show'); btn.disabled=true;
  setPhase('');

  const key = cacheKey(selectedSign.name);
  const cached = localStorage.getItem(key);
  if (cached) {
    await delay(500);
    loading.classList.remove('show'); btn.disabled=false;
    currentData = JSON.parse(cached);
    showResult(currentData);
    return;
  }

  try {
    setPhase('Ստանում ենք հորոսկոպ...');
    const res = await fetch(`https://corsproxy.io/?https://horoscope-app-api.vercel.app/api/v1/get-horoscope/daily?sign=${selectedSign.name}&day=today`);
    const json = await res.json();
    const api = json.data;
    const englishDesc = api.horoscope || '';

    setPhase('Թարգմանում ենք հայերեն...');
    const armenianDesc = await translateToArmenian(englishDesc);

    const moodIdx = Math.floor(Math.random()*MOODS_HY.length);
    const colorIdx = Math.floor(Math.random()*COLORS_HY.length);

    const data = {
      sign: selectedSign.nameHY,
      signEN: selectedSign.name,
      emoji: selectedSign.sym,
      descriptionEN: englishDesc,
      descriptionHY: armenianDesc,
      date: api.date || new Date().toLocaleDateString('hy-AM', {weekday:'long',month:'long',day:'numeric'}),
      lucky_number: Math.floor(Math.random()*99)+1,
      lucky_color: COLORS_HY[colorIdx],
      mood: MOODS_HY[moodIdx],
      element: selectedSign.element,
      ruling: selectedSign.ruling
    };

    localStorage.setItem(key, JSON.stringify(data));
    loading.classList.remove('show'); btn.disabled=false;
    currentData = data;
    currentLang = 'hy';
    showResult(data);
  } catch(e) {
    console.error(e);
    await delay(400);
    loading.classList.remove('show'); btn.disabled=false;
    errorEl.classList.add('show');
  }
}

function showResult(data) {
  const el = document.getElementById('result');
  const desc = (currentLang === 'hy' && data.descriptionHY) ? data.descriptionHY : data.descriptionEN;
  const langEN = currentLang === 'en' ? 'active' : '';
  const langHY = currentLang === 'hy' ? 'active' : '';

  el.innerHTML = `
    <div class="result-header">
      <div class="result-emoji">${data.emoji}</div>
      <div class="result-meta">
        <h3>${data.sign}</h3>
        <p class="date">${data.date}</p>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn ${langHY}" onclick="switchLang('hy')">🇦🇲 Հայերեն</button>
      <button class="lang-btn ${langEN}" onclick="switchLang('en')">🇬🇧 English</button>
    </div>
    ${currentLang==='hy' ? '<div class="translated-badge">Թարգմանված AI-ի կողմից</div>' : ''}
    <p class="result-text">${desc}</p>
    <div class="stats">
      <div class="stat"><div class="stat-label">Բախտի Թիվ</div><div class="stat-value">${data.lucky_number}</div></div>
      <div class="stat"><div class="stat-label">Բախտի Գույն</div><div class="stat-value" style="font-size:13px">${data.lucky_color}</div></div>
      <div class="stat"><div class="stat-label">Տարր</div><div class="stat-value" style="font-size:14px">${data.element}</div></div>
      <div class="stat"><div class="stat-label">Կառավարիչ Մոլորակ</div><div class="stat-value" style="font-size:13px">${data.ruling}</div></div>
      <div class="stat full"><div class="stat-label">Օրվա Էներգիա</div><div class="stat-value" style="font-size:15px">${data.mood}</div></div>
    </div>`;

  el.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
}

function switchLang(lang) {
  if (!currentData) return;
  currentLang = lang;
  showResult(currentData);
}

async function checkCompatibility() {
  const aSet=document.querySelector('#compatGrid .sign-btn.active');
  const bSet=document.querySelector('#compatGrid .sign-btn.active-b');
  if(!aSet||!bSet){alert('Սեղմեք մեկ անգամ ձեր նշանի վրա (ոսկի), հետո՝ նրա նշանի վրա (մանուշակ)։');return;}
  const btn=document.getElementById('compatBtn'), loading=document.getElementById('compatLoading');
  const res=document.getElementById('compatResult');
  res.classList.remove('show'); loading.classList.add('show'); btn.disabled=true;
  await delay(1100); loading.classList.remove('show'); btn.disabled=false;

  const ea=compatSignA.elementEN, eb=compatSignB.elementEN;
  const base=COMPAT_MATRIX[ea][eb];
  const score=Math.min(99,Math.max(30,base+rand(-4,4)));
  const cats={Սեր:clamp(score+rand(-10,10)),Բարեկամություն:clamp(score+rand(-8,8)),Հաղորդակցություն:clamp(score+rand(-12,12)),Կայունություն:clamp(score+rand(-10,10))};

  const order=['Fire','Earth','Air','Water'];
  const sorted=[ea,eb].sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  const descKey=sorted.join('-');
  const desc=COMPAT_DESCS_HY[descKey]||"Յուրահատուկ երկնային զույգ, որի սեփական կոսմիկ պատմությունը գրելու է։";

  const c=score>=80?'#f0d090':score>=65?'#c4b5fd':score>=50?'#93c5fd':'#fca5a5';
  const label=score>=80?'Երկնային Զույգ':score>=65?'Ամուր Կապ':score>=50?'Լրացնող':'Աճի Զույգ';
  const circ=Math.round(score*3.14);

  res.innerHTML=`
    <div class="compat-pair">
      <span class="sign-pill a">${compatSignA.emoji} ${compatSignA.nameHY}</span>
      <span class="heart">💫</span>
      <span class="sign-pill b">${compatSignB.emoji} ${compatSignB.nameHY}</span>
    </div>
    <div class="score-ring-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120" style="overflow:visible">
        <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="${c}" stroke-width="8"
          stroke-dasharray="${circ} 314" stroke-dashoffset="78.5" stroke-linecap="round"
          style="transition:stroke-dasharray 1.2s ease;filter:drop-shadow(0 0 6px ${c}55)"/>
        <text x="60" y="56" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="30" fill="${c}" font-weight="300">${score}%</text>
        <text x="60" y="73" text-anchor="middle" font-family="Outfit,sans-serif" font-size="8" fill="rgba(232,224,213,0.45)" letter-spacing="1">${label.toUpperCase()}</text>
      </svg>
    </div>
    <div class="compat-cats">
      ${Object.entries(cats).map(([n,v])=>`<div class="compat-cat"><div class="cat-name">${n}</div><div class="cat-bar"><div class="cat-fill" style="width:${v}%;background:linear-gradient(90deg,${c},${c}88)"></div></div><div class="cat-val">${v}%</div></div>`).join('')}
    </div>
    <div class="compat-desc">${desc}</div>`;
  res.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>res.classList.add('show')));
}

function clamp(v){return Math.min(99,Math.max(20,Math.round(v)));}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
